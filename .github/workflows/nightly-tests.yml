name: Nightly Cypress Tests

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all Cypress tests
        uses: cypress-io/github-action@v5
        with:
          browser: chrome
          record: false
          config-file: cypress.config.js
        env:
          CYPRESS_BASE_URL: https://practicesoftwaretesting.com

      - name: Generate test report
        if: always()
        run: |
          echo "Nightly test run completed at $(date)"

      - name: Archive test artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: nightly-test-results
          path: |
            cypress/screenshots/
            cypress/videos/
          retention-days: 30

      - name: Notify on test failure
        if: failure()
        run: |
          echo "⚠️ Nightly tests failed. Check the artifacts for details."
